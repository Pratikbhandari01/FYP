{% extends 'partials/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/agent_portal.css' %}">
{% endblock %}

{% block content %}
<section class="container agent-shell">
    <div class="agent-hero d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h2>Add Room Type</h2>
            <p class="mb-0 mt-1">Hotel: {{ hotel.name }}</p>
        </div>
        <a href="{% url 'hotel:room_type_list' hotel.id %}" class="btn btn-light fw-semibold">Back to Room Types</a>
    </div>

    <div class="card agent-panel">
        <div class="card-body agent-form">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex gap-2 pt-2 flex-wrap">
                    <button type="submit" class="btn btn-primary">Save Room Type</button>
                    <a href="{% url 'hotel:room_type_list' hotel.id %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
