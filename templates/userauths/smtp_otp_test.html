{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMTP OTP Test | Nepstay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth-clean.css' %}">
</head>
<body class="auth-page">
    <div class="auth-card auth-card-wide" role="main">
        <h1 class="auth-title">SMTP OTP Test</h1>
        <p class="auth-subtitle">Admin tool to verify OTP email delivery using current SMTP settings.</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'userauths:smtp_otp_test' %}" novalidate>
            {% csrf_token %}

            <div class="auth-field">
                <div class="auth-input-wrap">
                    <i class="bi bi-envelope-fill auth-icon" aria-hidden="true"></i>
                    <input
                        type="email"
                        id="recipient_email"
                        name="recipient_email"
                        class="auth-input"
                        placeholder="Recipient email"
                        value="{{ recipient_email }}"
                        required
                    >
                </div>
            </div>

            <div class="auth-field">
                <div class="auth-input-wrap">
                    <i class="bi bi-shield-lock-fill auth-icon" aria-hidden="true"></i>
                    <select id="otp_type" name="otp_type" class="auth-select" required>
                        <option value="email_verify" {% if selected_type == 'email_verify' %}selected{% endif %}>Email Verification OTP</option>
                        <option value="password_change" {% if selected_type == 'password_change' %}selected{% endif %}>Password Change OTP</option>
                        <option value="password_reset" {% if selected_type == 'password_reset' %}selected{% endif %}>Password Reset OTP</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="auth-btn">Send Test OTP</button>
        </form>

        <div class="auth-link-row">
            <a href="{% url 'hotel:index' %}">Back to Home</a>
        </div>
    </div>
</body>
</html>
