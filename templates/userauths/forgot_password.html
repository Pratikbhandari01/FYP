{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Nepstay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth-clean.css' %}">
</head>
<body class="auth-page">
    <div class="auth-card" role="main">
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-subtitle">Enter your username or email to receive a reset OTP.</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'userauths:forgot_password' %}" novalidate>
            {% csrf_token %}
            <div class="auth-field">
                <div class="auth-input-wrap">
                    <i class="bi bi-person-fill auth-icon" aria-hidden="true"></i>
                    <input
                        type="text"
                        id="login_key"
                        name="login_key"
                        class="auth-input"
                        placeholder="Username or Email"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="auth-btn">Send OTP</button>
        </form>

        <div class="auth-link-row">
            Remembered your password?
            <a href="{% url 'userauths:login' %}">Back to login</a>
        </div>
    </div>
</body>
</html>
