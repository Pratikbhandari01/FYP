{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nepstay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth-clean.css' %}">
</head>
<body class="auth-page">
    <div class="auth-card" role="main">
        <h1 class="auth-title">Login</h1>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'userauths:login' %}" novalidate>
            {% csrf_token %}

            <div class="auth-field">
                <div class="auth-input-wrap">
                    <i class="bi bi-person-fill auth-icon" aria-hidden="true"></i>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="auth-input"
                        placeholder="Your Name"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <div class="auth-field">
                <div class="auth-input-wrap">
                    <i class="bi bi-lock-fill auth-icon" aria-hidden="true"></i>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="auth-input"
                        placeholder="Password"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="auth-toggle" id="togglePassword" aria-label="Show password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <label class="auth-meta" for="remember_me">
                <input type="checkbox" id="remember_me" name="remember_me" value="1">
                <span>Remember me</span>
            </label>

            <button type="submit" class="auth-btn">Log in</button>
        </form>

        <div class="auth-link-row">
            No account yet?
            <a href="{% url 'userauths:register' %}">Create one</a>
        </div>
    </div>
    

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var toggle = document.getElementById('togglePassword');
            var password = document.getElementById('password');

            if (!toggle || !password) {
                return;
            }

            toggle.addEventListener('click', function () {
                var isPassword = password.getAttribute('type') === 'password';
                password.setAttribute('type', isPassword ? 'text' : 'password');
                toggle.innerHTML = isPassword ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
            });
        });
    </script>
</body>
</html>
