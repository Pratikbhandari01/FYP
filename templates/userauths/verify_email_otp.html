{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Nepstay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth-clean.css' %}">
</head>
<body class="auth-page">
    <div class="auth-card auth-card-otp" role="main">
        <a href="{% url 'userauths:login' %}" class="auth-back-link"><i class="bi bi-chevron-left"></i> Back</a>

        <h1 class="auth-title auth-title-center">Verify your email</h1>
        <p class="auth-subtitle auth-subtitle-center">
            The verification code has been sent to your email {{ masked_email }}.
        </p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'userauths:verify_email_otp' %}" novalidate>
            {% csrf_token %}
            <input type="hidden" id="otp" name="otp" value="">
            <div class="otp-grid" id="otpGrid">
                <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="OTP digit 1">
                <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 2">
                <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 3">
                <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 4">
                <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 5">
                <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 6">
            </div>

            <button type="submit" class="auth-btn otp-continue-btn">Continue</button>
        </form>

        <form method="POST" action="{% url 'userauths:verify_email_otp' %}" class="mt-3 text-center">
            {% csrf_token %}
            <input type="hidden" name="action" value="resend">
            <span class="text-muted small">Not received yet?</span>
            <button type="submit" class="btn btn-link p-0 ms-1">Resend verification code</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var grid = document.getElementById('otpGrid');
            var hiddenInput = document.getElementById('otp');
            if (!grid || !hiddenInput) {
                return;
            }

            var inputs = Array.prototype.slice.call(grid.querySelectorAll('.otp-cell'));

            function updateHidden() {
                hiddenInput.value = inputs.map(function (input) { return input.value.trim(); }).join('');
            }

            inputs.forEach(function (input, index) {
                input.addEventListener('input', function () {
                    input.value = input.value.replace(/\D/g, '').slice(0, 1);
                    if (input.value && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    updateHidden();
                });

                input.addEventListener('keydown', function (event) {
                    if (event.key === 'Backspace' && !input.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });

                input.addEventListener('paste', function (event) {
                    var pasted = (event.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, inputs.length);
                    if (!pasted) {
                        return;
                    }
                    event.preventDefault();
                    pasted.split('').forEach(function (char, i) {
                        inputs[i].value = char;
                    });
                    updateHidden();
                    var targetIndex = Math.min(pasted.length, inputs.length - 1);
                    inputs[targetIndex].focus();
                });
            });

            var form = grid.closest('form');
            if (form) {
                form.addEventListener('submit', function () {
                    updateHidden();
                });
            }
        });
    </script>
</body>
</html>
