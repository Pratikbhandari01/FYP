{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Nepstay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth-clean.css' %}">
</head>
<body class="auth-page">
    <div class="auth-card" role="main">
        <h1 class="auth-title">Reset Password</h1>
        <p class="text-secondary small mb-3">Enter the OTP sent to {{ masked_email }} and set your new password.</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'userauths:verify_password_reset_otp' %}" novalidate>
            {% csrf_token %}

            <div class="auth-field">
                <div class="auth-input-wrap">
                    <i class="bi bi-shield-lock-fill auth-icon" aria-hidden="true"></i>
                    <input
                        type="text"
                        id="otp"
                        name="otp"
                        class="auth-input"
                        placeholder="Enter OTP"
                        inputmode="numeric"
                        pattern="[0-9]{6}"
                        maxlength="6"
                        required
                    >
                </div>
            </div>

            <div class="auth-field">
                <div class="auth-input-wrap">
                    <i class="bi bi-lock-fill auth-icon" aria-hidden="true"></i>
                    <input
                        type="password"
                        id="new_password"
                        name="new_password"
                        class="auth-input"
                        placeholder="New Password"
                        minlength="8"
                        required
                    >
                </div>
            </div>

            <div class="auth-field">
                <div class="auth-input-wrap">
                    <i class="bi bi-lock-fill auth-icon" aria-hidden="true"></i>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        class="auth-input"
                        placeholder="Confirm New Password"
                        minlength="8"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="auth-btn">Reset Password</button>
        </form>

        <form method="POST" action="{% url 'userauths:verify_password_reset_otp' %}" class="mt-2">
            {% csrf_token %}
            <input type="hidden" name="action" value="resend">
            <button type="submit" class="btn btn-link p-0">Resend OTP</button>
        </form>

        <div class="auth-link-row">
            Back to
            <a href="{% url 'userauths:login' %}">Login</a>
        </div>
    </div>
</body>
</html>
