{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Hotel Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, .55), rgba(0, 0, 0, .55)),
                url("https://images.unsplash.com/photo-1566073771259-6a8506099945");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .3);
            overflow: hidden;
        }

        .hotel-image {
            height: 100%;
            background: url("https://images.unsplash.com/photo-1590490360182-c33d57733427");
            background-size: cover;
            background-position: center;
        }

        .form-section {
            padding: 40px;
        }

        .brand {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .btn-dark {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }

        .signup-link {
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">

            <div class="col-lg-9">

                <div class="row login-card">

                    <!-- Hotel Image Side -->
                    <div class="col-md-6 d-none d-md-block hotel-image"></div>

                    <!-- Login Form -->
                    <div class="col-md-6 form-section">

                        <h2 class="brand mb-3">🏨 Hotel Booking</h2>
                        <p class="text-muted mb-4">Login to manage your bookings</p>

                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label">Username or Email</label>
                                <input type="text" name="username" class="form-control"
                                    placeholder="Enter username or email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control"
                                    placeholder="Enter password">
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-dark">Login</button>
                            </div>

                        </form>

                        <div class="text-center">
                            <span class="text-muted">Don't have an account?</span>
                            <a href="{% url 'userauths:register' %}" class="signup-link">Sign Up</a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
